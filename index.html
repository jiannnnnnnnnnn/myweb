<!DOCTYPE html>
<html>
<head>
    <title>github webpage</title>

    <style>
        @font-face {
            font-family: 'HsGlidingSerif';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2604-1@1.0/HSHwalkongSerif-Regular.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }

        @media screen {
            body { background-color: rgb(255, 255, 255); }
        }

        @media print {
            body { background-color: rgb(255, 255, 255); }
        }

        body {
            font-family: 'HsGlidingSerif';
            text-align:center;
        }

        .card{
            width:260px;
            margin: 50px auto;
            padding: 70px;
            background:#eafbbc;
        }

        .author{
            text-align:right;
        }

    </style>

</head>
<body>
<div class="card">
    <h1>청포도</h1>
    <p class="author">-이육사</p>
    <p>
        <br>
        내 고장 칠월은<br>
        청포도가 익어가는 시절<br>
        <br>
        이 마을 전설이 주절이 주절이 열리고<br>
        먼데 하늘이 알알이 꿈꾸며 들어와 박혀<br>
        <br>
        하늘 밑 푸른 바다가 가슴을 열고<br>
        흰 돛단배가 곱게 밀려서 오면<br>
        <br>
        내가 바라는 손님은 고달픈 몸으로<br>
        청포를 입고 찾아온다고 했으니<br>
        <br>
        내 그를 맞아 이 포도를 따먹으면<br>
        두손을 한뿍 적셔도 좋으련<br>
        <br>
        아이야 우리 식탁엔 은쟁반에<br>
        하이얀 모시 수건을 마련해 두렴
    </p>

</div>
</body>
</html>
